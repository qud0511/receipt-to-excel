name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  quality:
    name: pytest + mypy + ruff + pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.13"
          enable-cache: true

      - name: Sync dependencies (frozen)
        run: uv sync --frozen --all-groups

      - name: ruff check
        run: uv run ruff check app/ tests/

      - name: ruff format --check
        run: uv run ruff format --check app/ tests/

      - name: mypy --strict
        run: uv run mypy --strict app/

      - name: pytest (excluding real_pdf smoke)
        run: uv run pytest -m "not real_pdf"

      - name: pip-audit --strict
        run: uv run pip-audit --strict
