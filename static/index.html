<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>영수증 → 지출결의서</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<header>
  <h1>영수증 → 지출결의서</h1>
  <p>영수증·매출전표를 업로드하면 엑셀로 변환해 드립니다</p>
</header>

<!-- Tab nav -->
<nav class="tab-nav">
  <button class="tab-btn active" data-tab="upload">변환</button>
  <button class="tab-btn" data-tab="templates">템플릿 관리</button>
</nav>

<!-- ═══════════════════════════ 변환 탭 ═══════════════════════════ -->
<div id="tab-upload" class="tab-content active">

  <div class="card">
    <h2>파일 업로드</h2>

    <label for="template-select">템플릿</label>
    <select id="template-select"><option value="">불러오는 중...</option></select>

    <div id="dropzone" class="dropzone">
      <div class="icon">📂</div>
      <p><strong>클릭하거나 파일을 드래그</strong>해서 추가하세요</p>
      <p>JPG · PNG · PDF · XLSX · PPTX 지원</p>
      <input id="file-input" type="file"
             accept=".jpg,.jpeg,.png,.pdf,.xlsx,.pptx" multiple hidden />
    </div>

    <div id="file-list"></div>
    <button id="submit-btn">변환 시작</button>
  </div>

  <!-- Progress -->
  <div class="card" id="progress-section">
    <h2>진행 상태 <span id="status-badge" class="status-badge badge-pending">대기 중</span></h2>
    <p id="progress-label" class="progress-label">0/0 완료</p>
    <div class="progress-bar-wrap">
      <div id="progress-bar" class="progress-bar"></div>
    </div>
    <ul id="failed-list" class="failed-list"></ul>
    <div id="log-viewer" class="log-viewer" aria-live="polite"></div>
  </div>

  <!-- Result -->
  <div class="card" id="result-section">
    <h2>다운로드</h2>
    <div id="download-btns" class="download-btns"></div>
  </div>

</div><!-- /tab-upload -->

<!-- ═══════════════════════════ 템플릿 관리 탭 ═══════════════════════════ -->
<div id="tab-templates" class="tab-content">

  <!-- 등록 카드 -->
  <div class="card">
    <h2>새 템플릿 등록</h2>
    <p class="hint">Named Range <code>FIELD_*</code>가 정의된 .xlsx 파일을 업로드하세요.</p>

    <label for="tpl-name">템플릿 이름</label>
    <input id="tpl-name" type="text" placeholder="예: 2025년 지출결의서" class="text-input" />

    <div id="tpl-dropzone" class="dropzone" style="margin-top:12px">
      <div class="icon">📋</div>
      <p><strong>클릭하거나 .xlsx를 드래그</strong></p>
      <input id="tpl-file-input" type="file" accept=".xlsx" hidden />
    </div>
    <div id="tpl-selected-file" class="tpl-selected-file"></div>

    <!-- Named Range 없는 파일 업로드 시 컬럼 매핑 UI -->
    <div id="tpl-mapper-section" hidden></div>

    <button id="tpl-register-btn" class="btn-primary" style="margin-top:14px" disabled>
      템플릿 등록
    </button>
    <p id="tpl-register-msg" class="form-msg"></p>
  </div>

  <!-- 목록 카드 -->
  <div class="card">
    <div class="card-header-row">
      <h2>등록된 템플릿</h2>
      <button id="tpl-refresh-btn" class="btn-icon" title="새로고침">↻</button>
    </div>
    <div id="tpl-list"></div>
  </div>

</div><!-- /tab-templates -->

<!-- 프롬프트 편집 모달 -->
<div id="prompt-modal" class="modal-overlay" hidden>
  <div class="modal">
    <h3 id="modal-title">커스텀 프롬프트 편집</h3>
    <p class="hint" style="margin-bottom:10px">
      비워두면 시스템 기본 프롬프트를 사용합니다.
    </p>
    <textarea id="modal-prompt" rows="8" class="prompt-textarea"
              placeholder="여기에 커스텀 시스템 프롬프트를 입력하세요..."></textarea>
    <div class="modal-actions">
      <button id="modal-cancel" class="btn-secondary">취소</button>
      <button id="modal-save" class="btn-primary">저장</button>
    </div>
  </div>
</div>

<script src="/static/app.js"></script>
<script src="/static/templates.js"></script>
</body>
</html>
